function isMainPage(name) {
	return name == "" || name.toLowerCase() == "main" || name.toLowerCase() == "owot";
}

	var user = params.user;

	var memkeyAccess = world.opts.memKey && world.opts.memKey == params.keyQuery;

	var is_owner = user.id == world.ownerId || (user.superuser && isMainPage(world.name));
	var is_member = !!world.members.map[user.id] || memkeyAccess || (user.superuser && isMainPage(world.name));

	var feature_perm = world.feature.memberTilesAddRemove;
	var can_owner = is_owner;
	var can_member = (is_member && feature_perm) || is_owner;
	if(!can_owner && !can_member) return; // redundant check (areas checked in tile_database.js)

	var action = data.action;

	var tileY = san_nbr(data.tileY);
	var charX = san_nbr(data.charX);
	var charY = san_nbr(data.charY);
	var charWidth = san_nbr(data.charWidth);
	var charHeight = san_nbr(data.charHeight);
	var precise = data.precise;
	var type = data.type;

	var ipAddress;
	var ipAddressVal;
	var ipAddressFam;
	if(params.ws && params.ws.sdata) {
		ipAddress = params.ws.sdata.ipAddress;
		ipAddressVal = params.ws.sdata.ipAddressVal;
		ipAddressFam = params.ws.sdata.ipAddressFam;
	} else {
		ipAddress = params.ipAddress;
		ipAddressVal = params.ipAddressVal;
		ipAddressFam = params.ipAddressFam;
	}

	var isGrouped = checkCoalition(ipAddressVal, ipAddressFam);

	var idLabel = isGrouped ? "cg1" : ipAddress;

	broadcastMonitorEvent("Protect", ipAddress + " set 'protect' on world '" + world.name + "' (" + world.id + "), coords (" + tileX + ", " + tileY + ")");

	var no_log_edits = world.opts.noLogEdits;

	var protect_type = void 0;
	if(type == "owner-only") {
		protect_type = 2;
	}
	if(type == "member-only") {
		protect_type = 1;
	}
	if(type == "public") {
		protect_type = 0;
	}
	if(protect_type == void 0 && action != "unprotect") {
		return [true, "PARAM"];
	}
	if(action == "unprotect") {
		protect_type = null;
	}

	// the x position going from 0 - 127 may be used at times
	var charIdx = charY * CONST.tileCols + charX;
	charX = charIdx % CONST.tileCols;
	charY = Math.floor(charIdx / CONST.tileCols);

	if(charIdx < 0 || charIdx >= CONST.tileArea) { // out of range coords
		return [true, "PARAM"];
	}

	if(!rate_limiter.setHold(idLabel, world.id, tileX, tileY)) {
		return [true, "RATE"];
	}

	var resp = await tile_database.write(tile_database.types.protect, {
		tileX, tileY,
		charX, charY,
		charWidth, charHeight,
		user, world, is_member, is_owner,
		type, precise, protect_type,
		channel, no_log_edits
	});

	rate_limiter.releaseHold(idLabel, world.id, tileX, tileY);

	return resp;
}

var server_start = Date.now();

function uptime(custom_ms_ago) {
	// (milliseconds ago)
	var difference = custom_ms_ago || (Date.now() - server_start);

	var str = "";

	var days = Math.floor(difference / 86400000);
	difference -= days * 86400000;
	var hours = Math.floor(difference / 3600000);
	difference -= hours * 3600000;
	var minutes = Math.floor(difference / 60000);
	difference -= minutes * 60000;
	var seconds = Math.floor(difference / 1000);
	difference -= seconds * 1000;

	if(days > 0) {
		if(str) str += ", ";
		str += days + " day" + (days != 1 ? "s" : "");
	}
	if(hours > 0) {
		if(str) str += ", ";
		str += hours + " hour" + (hours != 1 ? "s" : "");
	}
	if(minutes > 0) {
		if(str) str += ", ";
		str += minutes + " minute" + (minutes != 1 ? "s" : "");
	}
	if(seconds > 0) {
		if(str) str += ", ";
		str += seconds + " second" + (seconds != 1 ? "s" : "");
	}

	return str;
}

function generate_command_list() {
	var list = [];
	for(var i = 0; i < command_list.length; i++) {
		var command = command_list[i];
		var rank = command[0];
		list.push(command);
	}

	// sort the command list
	list.sort(function(v1, v2) {
		return v1[1].localeCompare(v2[1], "en", { sensitivity: "base" });
	});

	var html = "";
	html += "Command list:<br>";
	html += "<div style=\"background-color: #DADADA; font-family: monospace; font-size: 13px;\">";
	var cmdIdx = 0;
	for(var i = 0; i < list.length; i++) {
		var row = list[i];
		var command = row[1];
		var args = row[2];
		var desc = row[3];
		var example = row[4];

		// display arguments for this command
		var arg_desc = "";
		if(args) {
			arg_desc += html_tag_esc("<");
			for(var v = 0; v < args.length; v++) {
				var arg = args[v];
				arg_desc += "<span style=\"font-style: italic\">" + html_tag_esc(arg) + "</span>";
				if(v != args.length - 1) {
					arg_desc += ", ";
				}
			}
			arg_desc += html_tag_esc(">");
		}

		var exampleElm = "";
		if(example && args) {
			exampleElm = "title=\"" + html_tag_esc("Example: /" + command + " " + example) +"\"";
		}

		command = "<span " + exampleElm + "style=\"color: #00006F\">" + html_tag_esc(command) + "</span>";

		var help_row = html_tag_esc("-> /") + command + " " + arg_desc + " :: " + html_tag_esc(desc);

		// alternating stripes
		if(cmdIdx % 2 == 1) {
			help_row = "<div style=\"background-color: #C3C3C3\">" + help_row + "</div>";
		}

		html += help_row;
		cmdIdx++;
	}

	html += "</div>";

	return html;
}

					accepted.push(id);
				}
				var dataResp = {
					channel: self.cli_channel,
					kind: "tileUpdate",
					source: "write",
					tiles: {}
				};
				for(var i in editedTiles) {
					dataResp.tiles[i] = tile_database[i];
				}
				self.onmessage({
					data: JSON.stringify(dataResp)
				});
				self.onmessage({
					data: JSON.stringify({
						accepted: accepted,
						rejected: {},
						kind: "write"
					})
				});
			}
			if(data.kind == "link") {
				var ldata = data.data;
				var type = data.type;
				var tileX = ldata.tileX;
				var tileY = ldata.tileY;
				var charX = ldata.charX;
				var charY = ldata.charY;
				var url = ldata.url;
				var link_tileX = ldata.link_tileX;
				var link_tileY = ldata.link_tileY;
				var tile = tile_database[tileY + "," + tileX];
				if(!tile) {
					tile_database[tileY + "," + tileX] = {
						content: " ".repeat(128),
						properties: {
							cell_props: {},
							writability: null
						}
					};
					tile = tile_database[tileY + "," + tileX];
				}
				var cell_props = tile.properties.cell_props;
				if(!cell_props[charY]) {
					cell_props[charY] = {};
				}
				if(!cell_props[charY][charX]) {
					cell_props[charY][charX] = {};
				}
				cell_props[charY][charX] = {
					link: {
						type: type
					}
				};
				var lobj = cell_props[charY][charX].link;
				if(type == "url") {
					lobj.url = url;
				}
				if(type == "coord") {
					lobj.link_tileX = link_tileX;
					lobj.link_tileY = link_tileY;
				}
				self.onmessage({
					data: JSON.stringify({
						channel: self.cli_channel,
						kind: "tileUpdate",
						source: "write",
						tiles: {
							[tileY + "," + tileX]: tile
						}
					})
				});
			}
			if(data.kind == "protect") {
				var pdata = data.data;
				var action = data.action;
				var tileX = pdata.tileX;
				var tileY = pdata.tileY;
				var charX = pdata.charX;
				var charY = pdata.charY;
				var charWidth = pdata.charWidth;
				var charHeight = pdata.charHeight;
				if(!charWidth) charWidth = 1;
				if(!charHeight) charHeight = 1;
				var precise = pdata.precise;
				var type = pdata.type;
				var tile = tile_database[tileY + "," + tileX];
				if(!tile) {
					tile_database[tileY + "," + tileX] = {
						content: " ".repeat(128),
						properties: {
							cell_props: {},
							writability: null
						}
					};
					tile = tile_database[tileY + "," + tileX];
				}
				if(precise) {
					var pchardata = tile.properties.char;
					if(pchardata) {
						pchardata = decodeCharProt(pchardata);
					} else {
						pchardata = new Array(128).fill(null);
					}
					
					for(var y = 0; y < charHeight; y++) {
						for(var x = 0; x < charWidth; x++) {
							var cx = charX + x;
							var cy = charY + y;
							if(action == "protect") {
								var protVal = null;
								if(type == "owner-only") {
									protVal = 2;
								} else if(type == "member-only") {
									protVal = 1;
								} else if(type == "public") {
									protVal = 0;
								}
								pchardata[cy * 16 + cx] = protVal;
							} else if(action == "unprotect") {
								if(tile.properties.writability == null) {
									pchardata[cy * 16 + cx] = null;
								} else {
									for(var a = 0; a < pchardata.length; a++) {
										if(pchardata[a] == null) {
											pchardata[a] = tile.properties.writability;
										}
									}
									tile.properties.writability = null;
									pchardata[cy * 16 + cx] = null;
								}
							}
						}
					}
					
					tile.properties.char = encodeCharProt(pchardata);
				} else {
					delete tile.properties.char;
					if(action == "protect") {
						if(type == "owner-only") {
							tile.properties.writability = 2;
						} else if(type == "member-only") {
							tile.properties.writability = 1;
						} else if(type == "public") {
							tile.properties.writability = 0;
						}
					} else if(action == "unprotect") {
						tile.properties.writability = null;
					}
				}
				self.onmessage({
					data: JSON.stringify({
						channel: self.cli_channel,
						kind: "tileUpdate",
						source: "write",
						tiles: {
							[tileY + "," + tileX]: tile
						}
					})
				});
			}
			if(data.kind == "clear_tile") {
				var coordData = data.data;
				
				var tileX = coordData.tileX;
				var tileY = coordData.tileY;
				var tile = tile_database[tileY + "," + tileX];
				if(!tile) return;
				
				var charX = coordData.charX;
				var charY = coordData.charY;
				var charWidth = coordData.charWidth;
				var charHeight = coordData.charHeight;
				
				if(!charX) charX = 0;
				if(!charY) charY = 0;
				if(!charWidth) charWidth = 16;
				if(!charHeight) charHeight = 8;
				
				if(charX <= 0) charX = 0;
				if(charY <= 0) charY = 0;
				
				var content = advancedSplit(tile.content);
				for(var y = 0; y < charHeight; y++) {
					var cy = y + charY;
					if(cy >= 8) break;
					var cellPropRow = tile.properties.cell_props && tile.properties.cell_props[y];
					for(var x = 0; x < charWidth; x++) {
						var cx = x + charX;
						if(cx >= 16) break;
						content[cy * 16 + cx] = " ";
						if(cellPropRow && cellPropRow[cx]) {
							delete cellPropRow[cx];
							if(Object.keys(cellPropRow).length == 0) {
								delete tile.properties.cell_props[y];
							}
						}
						if(tile.properties.color) {
							tile.properties.color[cy * 16 + cx] = 0;
						}
						if(tile.properties.bgcolor) {
							tile.properties.bgcolor[cy * 16 + cx] = -1;
						}
					}
				}
				tile.content = content.join("");
				
				self.onmessage({
					data: JSON.stringify({
						kind: "tileUpdate",
						source: "write",
						tiles: {
							[tileY + "," + tileX]: tile
						}
					})
				});
			}
			if(data.kind == "chat") {
				var msg = data.message;
				if(msg == "/help") {
					self.onmessage({
						data: JSON.stringify({
							nickname: "[ Server ]",
							realUsername: "[ Server ]",
							id: 0,
							message: generate_command_list(),
							registered: true,
							location: data.location,
							op: true,
							admin: true,
							staff: true,
							color: "",
							kind: "chat"
						})
					});
				} else if(msg == "/uptime") {
					self.onmessage({
						data: JSON.stringify({
							nickname: "[ Server ]",
							realUsername: "[ Server ]",
							id: 0,
							message: "Server uptime: " + uptime(),
							registered: true,
							location: data.location,
							op: true,
							admin: true,
							staff: true,
							color: "",
							kind: "chat"
						})
					});
				} else if(msg == "/whoami") {
					self.onmessage({
						data: JSON.stringify({
							nickname: data.nickname,
							realUsername: "user",
							id: self.cli_id,
							message: `Who Am I:<br>Login username: user<br>Display username: user<br>Chat ID: ${self.cli_id}`,
							registered: true,
							location: data.location,
							op: true,
							admin: true,
							staff: true,
							color: data.color,
							kind: "chat"
						})
					});
				} else if(msg == "/test") {
					self.onmessage({
						data: JSON.stringify({
							nickname: data.nickname,
							realUsername: "user",
							id: self.cli_id,
							message: "This message is visible to only you.",
							registered: true,
							location: data.location,
							op: true,
							admin: true,
							staff: true,
							color: data.color,
							kind: "chat"
						})
					});
				} else {
					self.onmessage({
						data: JSON.stringify({
							nickname: data.nickname,
							realUsername: "user",
							id: self.cli_id,
							message: data.message,
							registered: true,
							location: data.location,
							op: true,
							admin: true,
							staff: true,
							color: data.color,
							kind: "chat"
						})
					});
				}
			}
		}, 1);
	}
	this.close = function() {
		this.onclose();
	}
	setTimeout(function() {
		self.readyState = WebSocket.OPEN;
		self.onopen();
		self.onmessage({
			data: JSON.stringify({
				kind: "channel",
				sender: self.cli_channel,
				id: self.cli_id,
				initial_user_count: 1
			})
		});
	}, 1);
	return this;
}

function off_getWorldProps(world, type, cb) {
	if(type == "style") {
		setTimeout(function() {
			var styleData = defaultStyles();
			cb(styleData, false);
		});
	} else {
		cb({}, false);
	}
}

var offTimerIdx = 1;
var offTimerReg = {};
function off_setInterval(func) {
	var newId = offTimerIdx++;
	offTimerReg[newId] = true;
	setTimeout(function() {
		while(true) {
			if(!offTimerReg[newId]) break;
			func();
		}
	}, 1);
	return newId;
}
function off_clearInterval(id) {
	delete offTimerReg[id];
}
